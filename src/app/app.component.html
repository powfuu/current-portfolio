<app-particles-background #particles></app-particles-background>
<app-custom-cursor></app-custom-cursor>
<app-scroll-indicator></app-scroll-indicator>
<div class="grain-overlay"></div>
<div class="bgEffect"></div>
<div class="dot-grid"></div>
<div class="scroll-progress-bar" [style.width.%]="scrollProgress"></div>
@if (!loadingScreen) {
  <div class="fixed-container">
    <app-language-selector></app-language-selector>
    <button (click)="toggleTheme($event)" class="theme-toggle">
      @if (theme === 'light') {
        <span>
          <i class="fa-solid fa-sun"></i>
        </span>
      }
      @if (theme === 'dark') {
        <span>
          <i class="fa-solid fa-moon"></i>
        </span>
      }
    </button>
  </div>
  <router-outlet></router-outlet>
} @else {
  <ng-container>
    <a class="logo">
      <span class="start-ring"></span>
      <span class="end-ring"></span>
      <span class="ring-border"></span>
      <span class="ring-text">E</span>
    </a>
  </ng-container>
}
