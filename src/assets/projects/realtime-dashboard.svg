<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#64ffda"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" fill="url(#bg)" rx="8"/>
  <!-- Top bar -->
  <rect x="20" y="20" width="440" height="30" fill="#1e293b" rx="4"/>
  <circle cx="38" cy="35" r="5" fill="#ef4444"/>
  <circle cx="55" cy="35" r="5" fill="#eab308"/>
  <circle cx="72" cy="35" r="5" fill="#22c55e"/>
  <!-- Cards row -->
  <rect x="20" y="65" width="100" height="60" fill="#1e293b" rx="6" stroke="#064e3b" stroke-width="1"/>
  <rect x="130" y="65" width="100" height="60" fill="#1e293b" rx="6" stroke="#064e3b" stroke-width="1"/>
  <rect x="240" y="65" width="100" height="60" fill="#1e293b" rx="6" stroke="#064e3b" stroke-width="1"/>
  <rect x="350" y="65" width="110" height="60" fill="#1e293b" rx="6" stroke="#064e3b" stroke-width="1"/>
  <!-- Chart area -->
  <rect x="20" y="140" width="280" height="140" fill="#1e293b" rx="6"/>
  <polyline points="40,250 80,230 120,240 160,200 200,210 240,180 280,170" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
  <polyline points="40,260 80,250 120,255 160,235 200,240 240,220 280,215" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4"/>
  <!-- Side panel -->
  <rect x="315" y="140" width="145" height="140" fill="#1e293b" rx="6"/>
  <rect x="325" y="155" width="125" height="18" fill="#064e3b" rx="3"/>
  <rect x="325" y="180" width="95" height="18" fill="#0f172a" rx="3"/>
  <rect x="325" y="205" width="110" height="18" fill="#0f172a" rx="3"/>
  <rect x="325" y="230" width="80" height="18" fill="#0f172a" rx="3"/>
  <rect x="325" y="255" width="125" height="18" fill="#0f172a" rx="3"/>
  <!-- Glow -->
  <circle cx="280" cy="170" r="4" fill="#64ffda" opacity="0.8"/>
</svg>
