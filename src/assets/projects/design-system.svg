<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" fill="url(#bg3)" rx="8"/>
  <!-- Color palette -->
  <rect x="30" y="30" width="40" height="40" fill="#64ffda" rx="8"/>
  <rect x="80" y="30" width="40" height="40" fill="#06b6d4" rx="8"/>
  <rect x="130" y="30" width="40" height="40" fill="#57cbff" rx="8"/>
  <rect x="180" y="30" width="40" height="40" fill="#0f172a" rx="8" stroke="#475569" stroke-width="1"/>
  <rect x="230" y="30" width="40" height="40" fill="#1e293b" rx="8" stroke="#475569" stroke-width="1"/>
  <!-- Typography -->
  <text x="300" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0">Aa</text>
  <text x="300" y="62" font-family="sans-serif" font-size="10" fill="#94a3b8">Inter / 16px</text>
  <!-- Component cards -->
  <rect x="30" y="90" width="130" height="80" fill="#1e293b" rx="8"/>
  <rect x="45" y="105" width="100" height="28" fill="#064e3b" rx="14"/>
  <text x="70" y="124" font-family="sans-serif" font-size="11" fill="#64ffda">Button</text>
  <rect x="45" y="142" width="60" height="18" fill="#0f172a" rx="4"/>
  <!-- Input component -->
  <rect x="175" y="90" width="130" height="80" fill="#1e293b" rx="8"/>
  <rect x="190" y="108" width="100" height="28" fill="#0f172a" rx="4" stroke="#475569" stroke-width="1"/>
  <text x="200" y="126" font-family="sans-serif" font-size="10" fill="#64748b">Input text...</text>
  <rect x="190" y="142" width="50" height="12" fill="#064e3b" rx="3"/>
  <!-- Card component -->
  <rect x="320" y="90" width="130" height="80" fill="#1e293b" rx="8"/>
  <rect x="335" y="105" width="100" height="50" fill="#0f172a" rx="4"/>
  <rect x="345" y="115" width="80" height="8" fill="#475569" rx="2"/>
  <rect x="345" y="130" width="60" height="6" fill="#334155" rx="2"/>
  <!-- Spacing grid -->
  <rect x="30" y="190" width="420" height="90" fill="#1e293b" rx="8"/>
  <text x="45" y="210" font-family="monospace" font-size="10" fill="#64ffda">Spacing: 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64</text>
  <rect x="45" y="220" width="4" height="20" fill="#06b6d4" rx="1"/>
  <rect x="55" y="220" width="8" height="20" fill="#06b6d4" rx="1"/>
  <rect x="70" y="220" width="12" height="20" fill="#06b6d4" rx="1"/>
  <rect x="90" y="220" width="16" height="20" fill="#06b6d4" rx="1"/>
  <rect x="115" y="220" width="24" height="20" fill="#06b6d4" rx="1"/>
  <rect x="148" y="220" width="32" height="20" fill="#06b6d4" rx="1"/>
  <rect x="190" y="220" width="48" height="20" fill="#06b6d4" rx="1"/>
  <rect x="248" y="220" width="64" height="20" fill="#06b6d4" rx="1"/>
  <!-- Tokens -->
  <text x="45" y="265" font-family="monospace" font-size="9" fill="#94a3b8">--color-primary: #64ffda</text>
  <text x="45" y="275" font-family="monospace" font-size="9" fill="#94a3b8">--radius-md: 8px</text>
</svg>
