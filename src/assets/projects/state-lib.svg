<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#0f172a" rx="8"/>
  <!-- npm package header -->
  <rect x="30" y="20" width="340" height="35" fill="#1e293b" rx="6"/>
  <text x="45" y="42" font-family="monospace" font-size="11" fill="#64ffda">@ever/reactive-store</text>
  <text x="260" y="42" font-family="monospace" font-size="9" fill="#94a3b8">v2.4.0 | 3.2kb</text>
  <!-- Code snippet -->
  <rect x="30" y="65" width="340" height="130" fill="#1e293b" rx="6"/>
  <text x="45" y="85" font-family="monospace" font-size="9" fill="#94a3b8">// Reactive state with zero boilerplate</text>
  <text x="45" y="100" font-family="monospace" font-size="9" fill="#06b6d4">const</text>
  <text x="75" y="100" font-family="monospace" font-size="9" fill="#e2e8f0">store = createStore({</text>
  <text x="55" y="115" font-family="monospace" font-size="9" fill="#e2e8f0">  count:</text>
  <text x="110" y="115" font-family="monospace" font-size="9" fill="#eab308">0</text>
  <text x="115" y="115" font-family="monospace" font-size="9" fill="#e2e8f0">,</text>
  <text x="55" y="130" font-family="monospace" font-size="9" fill="#e2e8f0">  users:</text>
  <text x="115" y="130" font-family="monospace" font-size="9" fill="#eab308">[]</text>
  <text x="45" y="145" font-family="monospace" font-size="9" fill="#e2e8f0">});</text>
  <text x="45" y="165" font-family="monospace" font-size="9" fill="#94a3b8">// Auto-subscription, computed, devtools</text>
  <text x="45" y="180" font-family="monospace" font-size="9" fill="#e2e8f0">store.</text>
  <text x="80" y="180" font-family="monospace" font-size="9" fill="#64ffda">select</text>
  <text x="120" y="180" font-family="monospace" font-size="9" fill="#e2e8f0">(s => s.count).</text>
  <text x="215" y="180" font-family="monospace" font-size="9" fill="#64ffda">subscribe</text>
  <text x="275" y="180" font-family="monospace" font-size="9" fill="#e2e8f0">(v => ...)</text>
  <!-- Stats -->
  <rect x="30" y="205" width="100" height="30" fill="#064e3b" rx="4"/>
  <text x="42" y="224" font-family="monospace" font-size="9" fill="#64ffda">↓ 12k/week</text>
  <rect x="140" y="205" width="100" height="30" fill="#1e293b" rx="4"/>
  <text x="152" y="224" font-family="monospace" font-size="9" fill="#06b6d4">★ 340 stars</text>
  <rect x="250" y="205" width="120" height="30" fill="#1e293b" rx="4"/>
  <text x="262" y="224" font-family="monospace" font-size="9" fill="#94a3b8">100% coverage</text>
</svg>
